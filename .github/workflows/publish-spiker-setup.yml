name: Publish Spiker Setup Release

on:
  repository_dispatch:
    types:
      - publish-spiker-setup
  workflow_dispatch:
    inputs:
      source_repository:
        description: "Private source repository that owns the setup artifact run."
        required: true
        default: "prodyum/spiker"
      source_run_id:
        description: "GitHub Actions run id that uploaded the setup artifact."
        required: true
      artifact_name:
        description: "Artifact name uploaded by the source workflow."
        required: true
        default: "spiker-setup"
      artifact_sha256:
        description: "Expected SHA256 of spiker-setup.exe from the source workflow."
        required: false
        default: ""
      release_tag:
        description: "Version tag recorded in the latest release notes and used by pin scripts."
        required: true

concurrency:
  group: publish-spiker-setup-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      SOURCE_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.source_repository || github.event.client_payload.source_repository }}
      SOURCE_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id || github.event.client_payload.source_run_id }}
      SOURCE_RUN_URL: ${{ github.event_name == 'workflow_dispatch' && format('https://github.com/{0}/actions/runs/{1}', inputs.source_repository, inputs.source_run_id) || format('https://github.com/{0}/actions/runs/{1}', github.event.client_payload.source_repository, github.event.client_payload.source_run_id) }}
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && 'manual' || github.event.client_payload.source_ref }}
      SOURCE_EVENT: ${{ github.event_name == 'workflow_dispatch' && 'workflow_dispatch' || github.event.client_payload.source_event }}
      SOURCE_SHA: ${{ github.event_name == 'workflow_dispatch' && '' || github.event.client_payload.source_sha }}
      ARTIFACT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_name || github.event.client_payload.artifact_name }}
      EXPECTED_ARTIFACT_SHA256: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_sha256 || github.event.client_payload.artifact_sha256 }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.client_payload.release_tag }}
    steps:
      - name: Checkout release metadata
        uses: actions/checkout@v4

      - name: Validate dispatch metadata
        shell: bash
        run: |
          set -euo pipefail
          for name in SOURCE_REPOSITORY SOURCE_RUN_ID ARTIFACT_NAME RELEASE_TAG; do
            value="${!name:-}"
            if [[ -z "$value" ]]; then
              echo "::error::$name is required."
              exit 2
            fi
          done
          if [[ "$RELEASE_TAG" =~ [\\/\[\]\^\ \*\`~:\?\<\>\|] ]]; then
            echo "::error::Invalid release tag: $RELEASE_TAG"
            exit 2
          fi
          if [[ -n "${EXPECTED_ARTIFACT_SHA256:-}" && ! "$EXPECTED_ARTIFACT_SHA256" =~ ^[0-9A-Fa-f]{64}$ ]]; then
            echo "::error::Invalid expected artifact SHA256: $EXPECTED_ARTIFACT_SHA256"
            exit 2
          fi

      - name: Download setup artifact from private source run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.SPIKER_SOURCE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::SPIKER_SOURCE_TOKEN secret is required to download private source artifacts."
            exit 3
          fi
          mkdir -p release-artifact
          for attempt in {1..20}; do
            if gh run download "$SOURCE_RUN_ID" \
              --repo "$SOURCE_REPOSITORY" \
              --name "$ARTIFACT_NAME" \
              --dir release-artifact; then
              exit 0
            fi
            echo "Artifact is not available yet; retry $attempt/20."
            sleep 15
          done
          echo "::error::Unable to download artifact '$ARTIFACT_NAME' from $SOURCE_REPOSITORY run $SOURCE_RUN_ID."
          exit 4

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="$(find release-artifact -type f -name 'spiker-setup.exe' -print -quit)"
          if [[ -z "$asset" ]]; then
            echo "::error::spiker-setup.exe was not found in the downloaded artifact."
            find release-artifact -maxdepth 4 -type f -print
            exit 5
          fi

          sha256="$(sha256sum "$asset" | awk '{print toupper($1)}')"
          expected_sha256="${EXPECTED_ARTIFACT_SHA256^^}"
          if [[ -n "$expected_sha256" && "$sha256" != "$expected_sha256" ]]; then
            echo "::error::Downloaded artifact SHA256 mismatch. expected=$expected_sha256 actual=$sha256"
            exit 6
          fi

          configure_git_identity() {
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
          }

          force_update_tag() {
            local tag="$1"
            git tag -f "$tag" "$GITHUB_SHA"
            git push origin "refs/tags/$tag" --force
          }

          delete_release_asset_if_exists() {
            local tag="$1"
            local asset_name="$2"
            local asset_ids
            mapfile -t asset_ids < <(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" \
              --jq ".assets[] | select(.name == \"$asset_name\") | .id" 2>/dev/null || true)
            local asset_id
            for asset_id in "${asset_ids[@]}"; do
              if [[ -n "$asset_id" ]]; then
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" >/dev/null
              fi
            done
          }

          upload_release_asset() {
            local tag="$1"
            local file="$2"
            delete_release_asset_if_exists "$tag" "$(basename "$file")"
            gh release upload "$tag" "$file" \
              --repo "$GITHUB_REPOSITORY"
          }

          verify_release_asset_metadata() {
            local tag="$1"
            local expected="$2"
            local expected_lower="${expected,,}"
            local asset_json
            asset_json="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" \
              --jq '.assets[] | select(.name == "spiker-setup.exe") | {digest: .digest, size: .size}')"
            if [[ -z "$asset_json" ]]; then
              echo "::error::spiker-setup.exe asset was not found on release tag $tag."
              exit 7
            fi

            local actual_digest
            actual_digest="$(jq -r '.digest // ""' <<<"$asset_json")"
            actual_digest="${actual_digest#sha256:}"
            actual_digest="${actual_digest,,}"
            if [[ "$actual_digest" != "$expected_lower" ]]; then
              echo "::error::Release asset digest mismatch for $tag. expected=$expected_lower actual=${actual_digest:-<missing>}"
              exit 7
            fi

            local size
            size="$(jq -r '.size // 0' <<<"$asset_json")"
            if [[ "$size" -le 0 ]]; then
              echo "::error::Release asset size is invalid for $tag: $size"
              exit 7
            fi

            local url="https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/spiker-setup.exe"
            if ! curl -fsSI --retry 5 --retry-delay 2 --max-time 20 "$url" >/dev/null; then
              echo "::error::Release asset URL is not reachable: $url"
              exit 7
            fi
          }

          verify_tag_points_to_head() {
            local tag="$1"
            local actual
            actual="$(git ls-remote --tags origin "refs/tags/$tag" | awk '{print $1}')"
            if [[ "$actual" != "$GITHUB_SHA" ]]; then
              echo "::error::Release tag $tag does not point at this workflow commit. expected=$GITHUB_SHA actual=${actual:-<missing>}"
              exit 8
            fi
          }

          configure_git_identity
          force_update_tag latest

          latest_notes_file="$(mktemp)"
          {
            echo "Spiker setup latest package."
            echo "Current version release: $RELEASE_TAG"
            echo "Source run: $SOURCE_RUN_URL"
            echo "Source repository: $SOURCE_REPOSITORY"
            echo "Source branch/tag: $SOURCE_REF"
            echo "Source commit: $SOURCE_SHA"
            echo "SHA256: $sha256"
          } > "$latest_notes_file"

          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Spiker Setup latest" \
              --notes-file "$latest_notes_file"
            upload_release_asset latest "$asset"
          else
            gh release create latest \
              --repo "$GITHUB_REPOSITORY" \
              --title "Spiker Setup latest" \
              --notes-file "$latest_notes_file" \
              --target "$GITHUB_SHA"
            upload_release_asset latest "$asset"
          fi

          verify_tag_points_to_head latest
          verify_release_asset_metadata latest "$sha256"

      - name: Cut over old releases
        if: ${{ env.SOURCE_EVENT == 'push' && env.SOURCE_REF == 'main' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pinned_tags=()
          if [[ -f release-pins.json ]]; then
            mapfile -t pinned_tags < <(jq -r '(.pinnedReleaseTags // [])[]' release-pins.json)
          fi

          is_pinned_release() {
            local candidate="$1"
            local pinned
            for pinned in "${pinned_tags[@]}"; do
              if [[ "$candidate" == "$pinned" ]]; then
                return 0
              fi
            done
            return 1
          }

          mapfile -t release_tags < <(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 1000 \
            --json tagName \
            --jq '.[].tagName')

          deleted=0
          for tag in "${release_tags[@]}"; do
            if [[ "$tag" == "latest" ]]; then
              continue
            fi

            if is_pinned_release "$tag"; then
              echo "Keeping pinned release: $tag"
              continue
            fi

            echo "Deleting old release and tag: $tag"
            gh release delete "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --cleanup-tag \
              --yes
            deleted=$((deleted + 1))
          done

          mapfile -t remaining_tags < <(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 1000 \
            --json tagName \
            --jq '.[].tagName')

          if ! printf '%s\n' "${remaining_tags[@]}" | grep -Fxq latest; then
            printf '::error::Expected latest release alias to remain; found: %s\n' "${remaining_tags[*]:-<none>}"
            exit 6
          fi

          echo "Cutover complete. Deleted $deleted old release(s); kept latest and ${#pinned_tags[@]} pinned release(s)."
